<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>ネイタル入力</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<main class="container">
  <h1>チャート入力（1人/時期系）</h1>
  <form id="natalForm">
    <label>モード
    <select name="chart_mode" id="chartMode">
      <option value="natal">natal</option>
      <option value="progressed">progressed</option>
      <option value="transit">transit</option>
      <option value="triple">triple</option>
    </select>
  </label>
  <label>名前 <input name="person_name" value="あなた"></label>
    <label>生年月日 <input name="date" type="date" required></label>
    <label>出生時刻 <input name="time" value="11:27" required></label>
    <label>タイムゾーン <input name="timezone" type="number" value="9" required></label>
    <label>緯度 <input name="lat" type="number" step="0.01" value="35.68" required></label>
    <label>経度 <input name="lon" type="number" step="0.01" value="139.65" required></label>
    <fieldset>
    <legend>基準日時（progressed / transit / triple 用）</legend>
    <label>日付 <input name="target_date" type="date"></label>
    <label>時刻 <input name="target_time" value="00:00"></label>
    <label>TZ <input name="target_timezone" type="number" value="9"></label>
    <label>緯度 <input name="target_lat" type="number" step="0.01" value="35.68"></label>
    <label>経度 <input name="target_lon" type="number" step="0.01" value="139.65"></label>
  </fieldset>
  <button type="submit">計算する</button>
  </form>
  <pre id="result"></pre>
</main>
<script src="/static/app.js"></script>
</body>
</html>
