<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>ネイタル入力</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<main class="container">
  <h1>ネイタル入力</h1>
  <form id="natalForm">
    <label>名前 <input name="person_name" value="あなた"></label>
    <label>生年月日 <input name="date" type="date" required></label>
    <label>出生時刻 <input name="time" value="11:27" required></label>
    <label>タイムゾーン <input name="timezone" type="number" value="9" required></label>
    <label>緯度 <input name="lat" type="number" step="0.01" value="35.68" required></label>
    <label>経度 <input name="lon" type="number" step="0.01" value="139.65" required></label>
    <button type="submit">計算する</button>
  </form>
  <pre id="result"></pre>
</main>
<script src="/static/app.js"></script>
</body>
</html>
