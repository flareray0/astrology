<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Astrology Local App</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; max-width: 960px; }
    label { display:block; margin-top: 1rem; }
    textarea { width: 100%; min-height: 360px; }
    select, input, button { padding: .5rem; margin-top: .3rem; }
    .box { border: 1px solid #ccc; padding: 1rem; border-radius: 12px; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Astrology Local App</h1>
  <form method="post" action="/api/report">
    <label>チャート種別
      <select name="chart_mode">
        <option value="natal">natal</option>
        <option value="progressed">progressed</option>
        <option value="transit">transit</option>
        <option value="triple">triple</option>
        <option value="synastry">synastry</option>
      </select>
    </label>

    <label>名前
      <input type="text" name="person_name" value="{{ person_name or 'あなた' }}">
    </label>

    <button type="submit">レポート生成</button>
  </form>

  <div class="box">
    <h2>結果</h2>
    <textarea readonly>{{ report or 'ここにレポートが表示されます。' }}</textarea>
  </div>
</body>
</html>
